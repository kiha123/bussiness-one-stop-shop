<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>eBOSS Permit Flowchart</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: sans-serif;
      background: #f5f5f3;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 {
      font-size: 20px;
      font-weight: 500;
      color: #2c2c2a;
      margin-bottom: 16px;
      text-align: center;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.10);
      padding: 24px;
      max-width: 720px;
      width: 100%;
    }
    svg text { font-family: sans-serif; }

    /* Color ramps */
    .c-green rect, .c-green polygon { fill: #EAF3DE; stroke: #3B6D11; }
    .c-green text { fill: #27500A; }
    .c-blue rect, .c-blue polygon { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue text { fill: #0C447C; }
    .c-amber rect, .c-amber polygon { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber text { fill: #633806; }
    .c-teal rect, .c-teal polygon { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal text { fill: #085041; }
    .c-gray rect, .c-gray polygon { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray text { fill: #444441; }
    .c-red rect, .c-red polygon { fill: #FCEBEB; stroke: #A32D2D; }
    .c-red text { fill: #791F1F; }

    .arr { stroke: #888780; stroke-width: 1; fill: none; }
    .leader { stroke: #888780; stroke-width: 0.5; fill: none; stroke-dasharray: 4 3; }
  </style>
</head>
<body>
  <div class="card">
    <h1>eBOSS Business Permit — System Flowchart</h1>
    <svg width="100%" viewBox="0 0 680 2300" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>

      <!-- START -->
      <g class="c-green">
        <rect x="270" y="20" width="140" height="40" rx="8" stroke-width="0.5"/>
        <text font-size="14" font-weight="500" x="340" y="40" text-anchor="middle" dominant-baseline="central">Start</text>
      </g>
      <line x1="340" y1="60" x2="340" y2="90" class="arr" marker-end="url(#arrow)"/>

      <!-- Access eBOSS -->
      <g class="c-blue">
        <rect x="200" y="90" width="280" height="40" rx="8" stroke-width="0.5"/>
        <text font-size="14" font-weight="500" x="340" y="110" text-anchor="middle" dominant-baseline="central">Access eBOSS website</text>
      </g>
      <line x1="340" y1="130" x2="340" y2="160" class="arr" marker-end="url(#arrow)"/>

      <!-- Select Service diamond -->
      <g class="c-amber">
        <polygon points="340,160 440,198 340,236 240,198" stroke-width="0.5"/>
        <text font-size="13" font-weight="500" x="340" y="198" text-anchor="middle" dominant-baseline="central">Select service</text>
      </g>

      <!-- === TRACK === -->
      <line x1="240" y1="198" x2="55" y2="198" class="arr" marker-end="url(#arrow)"/>
      <text font-size="11" x="148" y="191" text-anchor="middle" fill="#888780">Track</text>
      <g class="c-teal">
        <rect x="8" y="212" width="95" height="34" rx="6" stroke-width="0.5"/>
        <text font-size="12" font-weight="500" x="55" y="229" text-anchor="middle" dominant-baseline="central">Track app.</text>
      </g>
      <line x1="55" y1="246" x2="55" y2="268" class="arr" marker-end="url(#arrow)"/>
      <g class="c-gray">
        <rect x="8" y="268" width="95" height="34" rx="6" stroke-width="0.5"/>
        <text font-size="11" x="55" y="285" text-anchor="middle" dominant-baseline="central" fill="#444441">Enter ref. no.</text>
      </g>
      <line x1="55" y1="302" x2="55" y2="324" class="arr" marker-end="url(#arrow)"/>
      <g class="c-gray">
        <rect x="8" y="324" width="95" height="34" rx="6" stroke-width="0.5"/>
        <text font-size="11" x="55" y="341" text-anchor="middle" dominant-baseline="central" fill="#444441">View status</text>
      </g>
      <line x1="55" y1="358" x2="55" y2="388" class="arr" marker-end="url(#arrow)"/>
      <g class="c-red"><rect x="20" y="388" width="70" height="26" rx="6" stroke-width="0.5"/>
        <text font-size="11" x="55" y="401" text-anchor="middle" dominant-baseline="central">End</text></g>

      <!-- === VERIFY PERMIT === -->
      <line x1="268" y1="222" x2="168" y2="265" class="arr" marker-end="url(#arrow)"/>
      <text font-size="11" x="208" y="248" text-anchor="middle" fill="#888780">Verify</text>
      <g class="c-teal">
        <rect x="118" y="265" width="100" height="34" rx="6" stroke-width="0.5"/>
        <text font-size="12" font-weight="500" x="168" y="282" text-anchor="middle" dominant-baseline="central">Verify permit</text>
      </g>
      <line x1="168" y1="299" x2="168" y2="321" class="arr" marker-end="url(#arrow)"/>
      <g class="c-gray">
        <rect x="118" y="321" width="100" height="34" rx="6" stroke-width="0.5"/>
        <text font-size="11" x="168" y="338" text-anchor="middle" dominant-baseline="central" fill="#444441">Enter permit no.</text>
      </g>
      <line x1="168" y1="355" x2="168" y2="377" class="arr" marker-end="url(#arrow)"/>
      <g class="c-gray">
        <rect x="118" y="377" width="100" height="34" rx="6" stroke-width="0.5"/>
        <text font-size="11" x="168" y="394" text-anchor="middle" dominant-baseline="central" fill="#444441">Display validity</text>
      </g>
      <line x1="168" y1="411" x2="168" y2="431" class="arr" marker-end="url(#arrow)"/>
      <g class="c-red"><rect x="133" y="431" width="70" height="26" rx="6" stroke-width="0.5"/>
        <text font-size="11" x="168" y="444" text-anchor="middle" dominant-baseline="central">End</text></g>

      <!-- === COMPUTE FEES === -->
      <line x1="310" y1="232" x2="298" y2="265" class="arr" marker-end="url(#arrow)"/>
      <text font-size="11" x="326" y="252" text-anchor="middle" fill="#888780">Compute</text>
      <g class="c-teal">
        <rect x="248" y="265" width="100" height="34" rx="6" stroke-width="0.5"/>
        <text font-size="12" font-weight="500" x="298" y="282" text-anchor="middle" dominant-baseline="central">Compute fees</text>
      </g>
      <line x1="298" y1="299" x2="298" y2="321" class="arr" marker-end="url(#arrow)"/>
      <g class="c-gray">
        <rect x="248" y="321" width="100" height="34" rx="6" stroke-width="0.5"/>
        <text font-size="11" x="298" y="338" text-anchor="middle" dominant-baseline="central" fill="#444441">Input biz. details</text>
      </g>
      <line x1="298" y1="355" x2="298" y2="377" class="arr" marker-end="url(#arrow)"/>
      <g class="c-gray">
        <rect x="248" y="377" width="100" height="34" rx="6" stroke-width="0.5"/>
        <text font-size="11" x="298" y="394" text-anchor="middle" dominant-baseline="central" fill="#444441">Display est. fees</text>
      </g>
      <line x1="298" y1="411" x2="298" y2="431" class="arr" marker-end="url(#arrow)"/>
      <g class="c-red"><rect x="263" y="431" width="70" height="26" rx="6" stroke-width="0.5"/>
        <text font-size="11" x="298" y="444" text-anchor="middle" dominant-baseline="central">End</text></g>

      <!-- === BOOK APPOINTMENT === -->
      <line x1="370" y1="232" x2="382" y2="265" class="arr" marker-end="url(#arrow)"/>
      <text font-size="11" x="390" y="252" text-anchor="middle" fill="#888780">Book</text>
      <g class="c-teal">
        <rect x="332" y="265" width="100" height="34" rx="6" stroke-width="0.5"/>
        <text font-size="12" font-weight="500" x="382" y="282" text-anchor="middle" dominant-baseline="central">Book appt.</text>
      </g>
      <line x1="382" y1="299" x2="382" y2="321" class="arr" marker-end="url(#arrow)"/>
      <g class="c-gray">
        <rect x="332" y="321" width="100" height="34" rx="6" stroke-width="0.5"/>
        <text font-size="11" x="382" y="338" text-anchor="middle" dominant-baseline="central" fill="#444441">Select date/time</text>
      </g>
      <line x1="382" y1="355" x2="382" y2="377" class="arr" marker-end="url(#arrow)"/>
      <g class="c-gray">
        <rect x="332" y="377" width="100" height="34" rx="6" stroke-width="0.5"/>
        <text font-size="11" x="382" y="394" text-anchor="middle" dominant-baseline="central" fill="#444441">Confirm appt.</text>
      </g>
      <line x1="382" y1="411" x2="382" y2="431" class="arr" marker-end="url(#arrow)"/>
      <g class="c-red"><rect x="347" y="431" width="70" height="26" rx="6" stroke-width="0.5"/>
        <text font-size="11" x="382" y="444" text-anchor="middle" dominant-baseline="central">End</text></g>

      <!-- === RETIRE BUSINESS === -->
      <line x1="412" y1="222" x2="498" y2="265" class="arr" marker-end="url(#arrow)"/>
      <text font-size="11" x="464" y="247" text-anchor="middle" fill="#888780">Retire</text>
      <g class="c-teal">
        <rect x="448" y="265" width="100" height="34" rx="6" stroke-width="0.5"/>
        <text font-size="12" font-weight="500" x="498" y="282" text-anchor="middle" dominant-baseline="central">Retire biz.</text>
      </g>
      <line x1="498" y1="299" x2="498" y2="321" class="arr" marker-end="url(#arrow)"/>
      <g class="c-gray">
        <rect x="448" y="321" width="100" height="34" rx="6" stroke-width="0.5"/>
        <text font-size="11" x="498" y="338" text-anchor="middle" dominant-baseline="central" fill="#444441">Login</text>
      </g>
      <line x1="498" y1="355" x2="498" y2="377" class="arr" marker-end="url(#arrow)"/>
      <g class="c-gray">
        <rect x="448" y="377" width="100" height="34" rx="6" stroke-width="0.5"/>
        <text font-size="11" x="498" y="394" text-anchor="middle" dominant-baseline="central" fill="#444441">Submit retirement</text>
      </g>
      <line x1="498" y1="411" x2="498" y2="433" class="arr" marker-end="url(#arrow)"/>
      <g class="c-gray">
        <rect x="448" y="433" width="100" height="34" rx="6" stroke-width="0.5"/>
        <text font-size="11" x="498" y="450" text-anchor="middle" dominant-baseline="central" fill="#444441">BPLO reviews</text>
      </g>
      <line x1="498" y1="467" x2="498" y2="492" class="arr" marker-end="url(#arrow)"/>
      <g class="c-amber">
        <polygon points="498,492 558,520 498,548 438,520" stroke-width="0.5"/>
        <text font-size="12" font-weight="500" x="498" y="520" text-anchor="middle" dominant-baseline="central">Approved?</text>
      </g>
      <!-- No -->
      <line x1="558" y1="520" x2="610" y2="520" class="arr" marker-end="url(#arrow)"/>
      <text font-size="11" x="584" y="513" text-anchor="middle" fill="#888780">No</text>
      <g class="c-red">
        <rect x="610" y="504" width="62" height="32" rx="6" stroke-width="0.5"/>
        <text font-size="11" x="641" y="520" text-anchor="middle" dominant-baseline="central">Request fix</text>
      </g>
      <line x1="641" y1="536" x2="641" y2="590" stroke="#888780" stroke-width="1" fill="none"/>
      <g class="c-red"><rect x="606" y="580" width="70" height="26" rx="6" stroke-width="0.5"/>
        <text font-size="11" x="641" y="593" text-anchor="middle" dominant-baseline="central">End</text></g>
      <!-- Yes -->
      <line x1="498" y1="548" x2="498" y2="570" class="arr" marker-end="url(#arrow)"/>
      <text font-size="11" x="513" y="564" fill="#888780">Yes</text>
      <g class="c-green">
        <rect x="448" y="570" width="100" height="34" rx="6" stroke-width="0.5"/>
        <text font-size="12" font-weight="500" x="498" y="587" text-anchor="middle" dominant-baseline="central">Business retired</text>
      </g>
      <line x1="498" y1="604" x2="498" y2="624" class="arr" marker-end="url(#arrow)"/>
      <g class="c-red"><rect x="463" y="624" width="70" height="26" rx="6" stroke-width="0.5"/>
        <text font-size="11" x="498" y="637" text-anchor="middle" dominant-baseline="central">End</text></g>

      <!-- === START APPLICATION (main flow) === -->
      <line x1="440" y1="198" x2="598" y2="198" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
      <text font-size="11" x="520" y="191" text-anchor="middle" fill="#888780">Apply</text>

      <!-- Divider label -->
      <text font-size="13" font-weight="500" x="340" y="688" text-anchor="middle" fill="#888780">── Main Application Flow ──</text>

      <g class="c-blue">
        <rect x="230" y="700" width="220" height="40" rx="8" stroke-width="0.5"/>
        <text font-size="14" font-weight="500" x="340" y="720" text-anchor="middle" dominant-baseline="central">Start application</text>
      </g>
      <!-- Arrow from Apply branch into Start Application -->
      <path d="M598 198 L598 670 L450 670 L450 700" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

      <line x1="340" y1="740" x2="340" y2="768" class="arr" marker-end="url(#arrow)"/>
      <g class="c-gray">
        <rect x="230" y="768" width="220" height="40" rx="8" stroke-width="0.5"/>
        <text font-size="14" font-weight="500" x="340" y="788" text-anchor="middle" dominant-baseline="central">Register / Login</text>
      </g>
      <line x1="340" y1="808" x2="340" y2="836" class="arr" marker-end="url(#arrow)"/>

      <!-- Submit Application (loop target) -->
      <g class="c-gray">
        <rect x="230" y="836" width="220" height="40" rx="8" stroke-width="0.5"/>
        <text font-size="14" font-weight="500" x="340" y="856" text-anchor="middle" dominant-baseline="central">Submit application</text>
      </g>
      <line x1="340" y1="876" x2="340" y2="904" class="arr" marker-end="url(#arrow)"/>
      <g class="c-gray">
        <rect x="230" y="904" width="220" height="40" rx="8" stroke-width="0.5"/>
        <text font-size="14" font-weight="500" x="340" y="924" text-anchor="middle" dominant-baseline="central">Upload documents</text>
      </g>
      <line x1="340" y1="944" x2="340" y2="972" class="arr" marker-end="url(#arrow)"/>
      <g class="c-blue">
        <rect x="230" y="972" width="220" height="40" rx="8" stroke-width="0.5"/>
        <text font-size="14" font-weight="500" x="340" y="992" text-anchor="middle" dominant-baseline="central">Send to BPLO</text>
      </g>
      <line x1="340" y1="1012" x2="340" y2="1040" class="arr" marker-end="url(#arrow)"/>
      <g class="c-blue">
        <rect x="230" y="1040" width="220" height="40" rx="8" stroke-width="0.5"/>
        <text font-size="14" font-weight="500" x="340" y="1060" text-anchor="middle" dominant-baseline="central">BPLO review</text>
      </g>
      <line x1="340" y1="1080" x2="340" y2="1110" class="arr" marker-end="url(#arrow)"/>

      <!-- Docs Complete? -->
      <g class="c-amber">
        <polygon points="340,1110 440,1148 340,1186 240,1148" stroke-width="0.5"/>
        <text font-size="13" font-weight="500" x="340" y="1148" text-anchor="middle" dominant-baseline="central">Docs complete?</text>
      </g>
      <!-- No -->
      <line x1="240" y1="1148" x2="110" y2="1148" class="arr" marker-end="url(#arrow)"/>
      <text font-size="11" x="175" y="1141" text-anchor="middle" fill="#888780">No</text>
      <g class="c-red">
        <rect x="30" y="1128" width="148" height="40" rx="8" stroke-width="0.5"/>
        <text font-size="12" font-weight="500" x="104" y="1148" text-anchor="middle" dominant-baseline="central">Return: request fix</text>
      </g>
      <path d="M30 1148 L12 1148 L12 856 L230 856" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
      <!-- Yes -->
      <line x1="340" y1="1186" x2="340" y2="1216" class="arr" marker-end="url(#arrow)"/>
      <text font-size="11" x="356" y="1206" fill="#888780">Yes</text>
      <g class="c-blue">
        <rect x="205" y="1216" width="270" height="40" rx="8" stroke-width="0.5"/>
        <text font-size="13" font-weight="500" x="340" y="1236" text-anchor="middle" dominant-baseline="central">Forward to endorsing offices</text>
      </g>
      <line x1="340" y1="1256" x2="340" y2="1284" class="arr" marker-end="url(#arrow)"/>
      <g class="c-blue">
        <rect x="190" y="1284" width="300" height="40" rx="8" stroke-width="0.5"/>
        <text font-size="13" font-weight="500" x="340" y="1304" text-anchor="middle" dominant-baseline="central">Review: Sanitary / BFP / OBO</text>
      </g>
      <line x1="340" y1="1324" x2="340" y2="1354" class="arr" marker-end="url(#arrow)"/>

      <!-- Inspection Required? -->
      <g class="c-amber">
        <polygon points="340,1354 440,1392 340,1430 240,1392" stroke-width="0.5"/>
        <text font-size="13" font-weight="500" x="340" y="1392" text-anchor="middle" dominant-baseline="central">Inspection needed?</text>
      </g>
      <!-- No -->
      <line x1="440" y1="1392" x2="564" y2="1392" class="arr" marker-end="url(#arrow)"/>
      <text font-size="11" x="502" y="1385" text-anchor="middle" fill="#888780">No</text>
      <g class="c-green">
        <rect x="524" y="1372" width="138" height="40" rx="8" stroke-width="0.5"/>
        <text font-size="12" font-weight="500" x="593" y="1392" text-anchor="middle" dominant-baseline="central">Approve endorsement</text>
      </g>
      <line x1="593" y1="1412" x2="593" y2="1540" stroke="#888780" stroke-width="1"/>
      <!-- Yes -->
      <line x1="340" y1="1430" x2="340" y2="1460" class="arr" marker-end="url(#arrow)"/>
      <text font-size="11" x="356" y="1450" fill="#888780">Yes</text>
      <g class="c-gray">
        <rect x="210" y="1460" width="260" height="40" rx="8" stroke-width="0.5"/>
        <text font-size="14" font-weight="500" x="340" y="1480" text-anchor="middle" dominant-baseline="central">Schedule inspection</text>
      </g>
      <line x1="340" y1="1500" x2="340" y2="1528" class="arr" marker-end="url(#arrow)"/>
      <g class="c-gray">
        <rect x="210" y="1528" width="260" height="40" rx="8" stroke-width="0.5"/>
        <text font-size="14" font-weight="500" x="340" y="1548" text-anchor="middle" dominant-baseline="central">Conduct inspection</text>
      </g>
      <line x1="340" y1="1568" x2="340" y2="1598" class="arr" marker-end="url(#arrow)"/>

      <!-- Inspection Passed? -->
      <g class="c-amber">
        <polygon points="340,1598 440,1636 340,1674 240,1636" stroke-width="0.5"/>
        <text font-size="13" font-weight="500" x="340" y="1636" text-anchor="middle" dominant-baseline="central">Inspection passed?</text>
      </g>
      <!-- No -->
      <line x1="240" y1="1636" x2="110" y2="1636" class="arr" marker-end="url(#arrow)"/>
      <text font-size="11" x="175" y="1629" text-anchor="middle" fill="#888780">No</text>
      <g class="c-red">
        <rect x="30" y="1616" width="148" height="40" rx="8" stroke-width="0.5"/>
        <text font-size="12" font-weight="500" x="104" y="1636" text-anchor="middle" dominant-baseline="central">Reject: fix issues</text>
      </g>
      <path d="M30 1636 L8 1636 L8 856 L230 856" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
      <!-- Yes -->
      <line x1="340" y1="1674" x2="340" y2="1704" class="arr" marker-end="url(#arrow)"/>
      <text font-size="11" x="356" y="1694" fill="#888780">Yes</text>

      <!-- Merge approve + passed -->
      <line x1="340" y1="1704" x2="593" y2="1704" stroke="#888780" stroke-width="1"/>
      <line x1="593" y1="1540" x2="593" y2="1704" stroke="#888780" stroke-width="1"/>
      <line x1="466" y1="1704" x2="466" y2="1732" class="arr" marker-end="url(#arrow)"/>

      <g class="c-blue">
        <rect x="341" y="1732" width="250" height="40" rx="8" stroke-width="0.5"/>
        <text font-size="14" font-weight="500" x="466" y="1752" text-anchor="middle" dominant-baseline="central">Return to BPLO</text>
      </g>
      <line x1="466" y1="1772" x2="466" y2="1800" class="arr" marker-end="url(#arrow)"/>
      <g class="c-blue">
        <rect x="341" y="1800" width="250" height="40" rx="8" stroke-width="0.5"/>
        <text font-size="14" font-weight="500" x="466" y="1820" text-anchor="middle" dominant-baseline="central">Generate tax order</text>
      </g>
      <line x1="466" y1="1840" x2="466" y2="1868" class="arr" marker-end="url(#arrow)"/>
      <g class="c-gray">
        <rect x="341" y="1868" width="250" height="40" rx="8" stroke-width="0.5"/>
        <text font-size="14" font-weight="500" x="466" y="1888" text-anchor="middle" dominant-baseline="central">Applicant pays fees</text>
      </g>
      <line x1="466" y1="1908" x2="466" y2="1936" class="arr" marker-end="url(#arrow)"/>
      <g class="c-gray">
        <rect x="316" y="1936" width="300" height="40" rx="8" stroke-width="0.5"/>
        <text font-size="13" font-weight="500" x="466" y="1956" text-anchor="middle" dominant-baseline="central">Treasurer verifies payment</text>
      </g>
